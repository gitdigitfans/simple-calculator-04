  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كيوت كيدز - تم تأكيد الطلب</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
  </style>
</head>
<body class="bg-[#F8F9FA] text-gray-800">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 max-w-lg w-full text-center">
      <div class="text-7xl mb-6">🎉</div>
      <h1 class="text-3xl font-extrabold text-[#1D355E] mb-2">تم تأكيد الطلب!</h1>
      <p class="text-gray-500 mb-8">شكراً لك على طلبك. سنقوم بالتواصل معك قريباً لتأكيد الشحن.</p>
      <div id="orderDetails" class="bg-gray-50 rounded-2xl p-6 mb-8 text-right">
        <div class="flex justify-between mb-3">
          <span class="text-gray-500">رقم الطلب</span>
          <span class="font-bold text-[#1D355E]" id="orderNumber">-</span>
        </div>
        <div class="flex justify-between mb-3">
          <span class="text-gray-500">التاريخ</span>
          <span class="font-semibold" id="orderDate">-</span>
        </div>
        <div class="flex justify-between mb-3">
          <span class="text-gray-500">الحالة</span>
          <span class="font-semibold text-[#F3B423]">قيد الانتظار</span>
        </div>
        <div class="flex justify-between pt-3 border-t border-gray-200">
          <span class="text-gray-500">الإجمالي</span>
          <span class="font-bold text-[#1D355E] text-xl" id="orderTotal">-</span>
        </div>
      </div>
      <a href="/" class="inline-block px-8 py-3 bg-[#1D355E] text-white font-bold rounded-xl hover:bg-[#2B4A7A] transition">العودة للرئيسية</a>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var order = null;
      try { order = JSON.parse(localStorage.getItem('cuteKidsLastOrder') || 'null'); } catch(e) {}
      if (!order) {
        document.getElementById('orderDetails').innerHTML = '<p class="text-gray-400 text-center">لا توجد بيانات طلب</p>';
        return;
      }
      document.getElementById('orderNumber').textContent = '#' + order.id;
      document.getElementById('orderDate').textContent = new Date(order.created_at || order.date).toLocaleDateString('ar-EG');
      document.getElementById('orderTotal').textContent = order.total + ' ج.م';
      // Fire Facebook Purchase event
      if (typeof fbq !== 'undefined') {
        fbq('track', 'Purchase', {
          value: order.total,
          currency: 'EGP',
          content_ids: (order.items || []).map(function(i) { return String(i.productId); }),
          content_type: 'product',
        });
      }
      // Fire TikTok Purchase event
      if (typeof ttq !== 'undefined') {
        ttq.track('Purchase', {
          value: order.total,
          currency: 'EGP',
          content_ids: (order.items || []).map(function(i) { return String(i.productId); }),
          content_type: 'product',
        });
      }
      localStorage.removeItem('cuteKidsLastOrder');
    });
  </script>
</body>
</html>
